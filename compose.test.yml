services:
  mariadb-test:
    image: mariadb:11.4
    ports:
      - "3307:3306"
    environment:
      MARIADB_ROOT_PASSWORD: test_root_password
      MARIADB_DATABASE: lavaanime_test
      MARIADB_USER: LavaAnimeTest
      MARIADB_PASSWORD: test_password
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_uca1400_as_ci
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mariadb-admin ping -h 127.0.0.1 -u root -p$$MARIADB_ROOT_PASSWORD --silent",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
